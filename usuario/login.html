<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Clinica, Hospital, Inteligencia Artificial, Turnos, Biomedicina, Medicina, Salud, Usuario">
    <meta name="author" content="Grupo 1">
    <link href="../CSS/tomy.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <script src="/JS/scripts.js"></script>

    <title>ClinicAI - Login</title>
</head>
<body class="page-login">

    <div class="container">
        <div class="screen">
            <div class="screen__content">
                <form id="login">

                    <div class="login__field">
                        <i class="login__icon fas fa-user"></i>
                        <input type="text" class="login__input" id="userL" placeholder="Email">
                    </div>

                    <div class="login__field">
                        <i class="login__icon fas fa-lock"></i>
                        <input type="password" class="login__input" id="pswL" placeholder="Password">
                    </div>

                    <script>
                        function validarLogin()
                        {
                            const name = document.getElementById("userL");
                            const psw = document.getElementById("pswL");
                            if( name.value.length < 1 || psw.value.length < 1 )
                            {
                                    window.alert("verifique los datos");
                            }
                        }
                    </script>

                    <button class="button login__submit" onclick="validarLogin()">
                        <span class="button__text">Log In Now</span>
                        <i class="button__icon fas fa-chevron-right"></i>
                    </button>

                </form>

                <div class="social-login">
                    <div class="social-icons">
                        <a href="https://www.google.com/" class="social-login__icon fab fa-google"></a>
                    </div>
                </div>
            </div>
            <div class="screen__background">
                <span class="screen__background__shape screen__background__shape4"></span>
                <span class="screen__background__shape screen__background__shape3"></span>
                <span class="screen__background__shape screen__background__shape2"></span>
                <span class="screen__background__shape screen__background__shape1"></span>
            </div>
        </div>
    </div>

</body>
</html>
