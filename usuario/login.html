<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Clinica, Hospital, Inteligencia Artificial, Turnos, Biomedicina, Medicina, Salud, Usuario">
    <meta name="author" content="Grupo 1">
    <link href="../CSS/styles.css" rel="stylesheet">
    <title>ClinicAI - Login</title>
</head>
<body>
    <div class="container-login">
        <div class="void"></div>
        <div class="lgn-element">
            <img src="../source/img/entrada.jpg" alt="entrada de hospital" width="100%">
        </div>
        <div class="form-login">
        <form method="post" action="#" class="form-box" autocomplete="on">
                <input type="email" id="mail" name="mail" placeholder="Email" required>
                <input type="password" id="contrasenia" name="contraseña" placeholder="Contraseña" required>
                <div>
                    <input type="checkbox" id="recordar" name="recordar" >Recordar usuario
                </div>
                <button type="button">Mostrar</button>

                <input type="submit" value="Iniciar Sesión">
                <a href="#">Olvidé mi contraseña</a>
                <div class="icons">
                    <button type="button">Entrar con Google</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
