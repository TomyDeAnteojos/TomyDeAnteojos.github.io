<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="../CSS/styles.css" rel="stylesheet">

<body class="pgn-login">
    <div id="logeo">
        <img src="../source/img/entrada.jpg" alt="entrada de hospital" width="900px">
    </div>
    <form method="post" action="#" class="form-login" autocomplete="on">
        <h1 style="text-align: center;">Bienvenido!</h1>
        
        <label for="txt-mail" name="lbl-mail">Ingrese su nombre</label>
        <input type="email" name="txt-mail" id="login" placeholder="example@gmail.com" >

        <br/><br/>

        <label for="txt-pass" name="lbl-pass">Ingrese su contraseña</label>
        <input type="password" name="txt-pass" id="login" placeholder="password">

        <br/><br/>
        
        <a href="#" id="olvido-pass"> olvido su contraseña?</a>
        
        <br/><br/>
        
        <input type="submit" value="Login" name="btn-enviar"/>
        <a href="registrar.html" class="btn-registrar">Registrar</a>
        
        <br/><br/>
        
        <input type="checkbox" name="chk-recordar" id="login"/>
        <label for="chk-recordar">recordar usuario</label>

        <br/><br/>

        <div class="icon-login">
            Iniciar sesion con google <br/><br/>
            <img src="../source/img/google.png" alt="iniciar sesion con google" width="30px"/>
        </div>
        
    </form>
    
</body>
</html>
