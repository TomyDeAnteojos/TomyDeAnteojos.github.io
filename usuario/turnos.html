<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de turnos</title>
    <link rel="stylesheet" href="../CSS/nico.css">
    <link rel="stylesheet" href="https://unpkg.com/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<body>
    <div class="contenido">

        <h1>Gestion de turnos</h1>

        <div class="solicitud">


            <div class="datos">
                <h3>Solicitud de turno</h3>
                <form action="#" method="post">
                    <fieldset>
                    <legend>DATOS PERSONALES</legend>

                    <p>
                        <label for="obs">Obra social:</label>
                        <input type="text" name="obrasocial" id="obs">
                    </p>
                    <br><br>


                    <p>
                        <label for="tur">Fecha para el turno:</label>
                        <input type="date" name="turno" id="tur">
                    </p>
                    <br><br>


                    <p>
                        <label for="med">Especialista Médico:</label>
                        <select name="especialistamedico" id="med" required>
                        <option value="0"></option>
                        <option value="1">Cardiología</option>
                        <option value="2">Kinesiología</option>
                        <option value="3">Guardia</option>
                        <option value="4">Laboratorio</option>
                        <option value="5">Cirugía</option>
                        </select>
                    </p>
                    <br><br>




                    <p>
                        <button type="submit">
                            Enviar
                        </button>
                    </p>
                </fieldset>
                </form>

            </div>


        </div>
    </div>

    <footer>
        <div class="cajon">
          <h1>ClinicAI</h1>
        <div class="conteiner">
            <div class="logo-footer"> <img src="/source/img/logosF.png" alt="footer"></div>
            <div class="itemb">
                <ul>
                    <li> <a href="Usuario">Usuario</a></li>
                    <li> <a href="Obras Sociales">Obras Sociales</a></li>
                    <li> <a href="Sobre Nosotros">Sobre Nosotros</a></li>
                    <li> <a href="Especialidades">Especialidades</a></li>
                    <li> <a href="Sanatorios">Sanatorios</a></li>
                </ul>
            </div>
            <div class="itemd">
              <p>Nuevas Reseñas</p>
              <textarea name="message" rows="10" cols="25" id="resenia"></textarea> <br>
              <button type="submit" class="buton" onclick="resenia()">Enviar</button>
            </div>
            <script>
              function resenia()
              {
                const resenia = document.getElementById("resenia");
                if(resenia.value.length == 0)
                {
                  alert('por favor llene los datos');
                }
                else 
                {
                  alert('Gracias por visitarnos!');
                  document.getElementById("resenia").value = "";
                }
              }
            </script>
        </div>
        <div class="caja">
          <div class="pies">
            <p> <i class="fa-brands fa-square-facebook fa-2xl"> </i> <i class="fa-brands fa-instagram fa-2xl"></i> <i class="fa-brands fa-square-x-twitter fa-2xl"></i></p>
                <p> </p>
               <p> </p></div>
          <div class="pies"> <p> 2024, derechos reservados para CAI </p></div>
          <div class="pies"> <p>Politicvas De privacidad</p></div>
          <div class="pies"> <p>Terminos y condiciones</p></div>
          <div class="pies"> <p>Ayuda y soporte</p></div>
        </div>
      </div>
        </footer>
