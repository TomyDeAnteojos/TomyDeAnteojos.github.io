<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Clinica, Hospital, Inteligencia Artificial, Turnos, Biomedicina, Medicina, Salud">
    <meta name="author" content="Grupo 1">
    <title>ClinicAI - Registrar</title>
    <link href="../CSS/tomy.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>

<body class="page-register">
    <div class="container">
        <div class="title">Registrar</div>
        <div class="content">
          <form action="#">
            <div class="user-details">
              <div class="input-box">
                <span class="details">Nombre</span>
                <input type="text" placeholder="Ingresa tu nombre" id="name">
              </div>
              <div class="input-box">
                <span class="details">Apellido</span>
                <input type="text" placeholder="Ingresa tu apellido" id="last_name">
              </div>
              <div class="input-box">
                <span class="details">Email</span>
                <input type="text" placeholder="Ingresa tu Email" id="email">
              </div>
              <div class="input-box">
                <span class="details">Numero de telefono</span>
                <input type="tel" placeholder="Ingresa tu telefono" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}" id="number">
              </div>
              <div class="input-box">
                <span class="details">Contraseña</span>
                <input type="password" placeholder="Ingresa tu contraseña" id="psw">
              </div>
              <div class="input-box">
                <span class="details">Confirmar Contraseña</span>
                <input type="password" placeholder="Repite la contraseña" id="psw1">
              </div>
            </div>
            <div class="gender-details" id="genero">
              <input type="radio" name="gender" id="dot-1">
              <input type="radio" name="gender" id="dot-2">
              <span class="gender-title">Genero</span>
              <div class="category">
                <label for="dot-1">
                <span class="dot one"></span>
                <span class="gender">Hombre</span>
              </label>
              <label for="dot-2">
                <span class="dot two"></span>
                <span class="gender">Mujer</span>
              </label>
              </div>
            </div>

            <script>
              function validarRegistro()
              {
                  const name = document.getElementById("name");
                  const last_name = document.getElementById("last_name");
                  const email = document.getElementById("email");
                  const number = document.getElementById("number");
                  const psw = document.getElementById("psw");
                  const psw1 = document.getElementById("psw1");
                  if( name.value.length < 1 || last_name.value.length < 1
                   || email.value.length < 1 || number.value.length < 1
                   || psw.value.length < 1 || psw1.value.length < 1
                   || psw.value == psw1.value)
                  {
                          window.alert("verifique los datos");
                  }
              }
          </script>
            <div class="button" onclick="validarRegistro()">
              <input type="submit" value="Registrar">
            </div>
          </form>
        </div>
      </div>
</body>
</html>
