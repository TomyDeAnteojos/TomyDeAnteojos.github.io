<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Clinica, Hospital, Inteligencia Artificial, Turnos, Biomedicina, Medicina, Salud">
    <meta name="author" content="Grupo 1">

    <link href="../CSS/tomy.css" rel="stylesheet">
    <title>ClinicAI - Menu Principal</title>
</head>

<body>
    <header>

    </header>

    <div class="page-index">

        <div class="principal">

            <div class="text">
                <h1>
                    Bienvenido al portal Clinica <span>codo a Codo</span>
                </h1>
            </div>
            <div class="void1"></div>
            <div class="img_log">
                <a href="/usuario/login.html">
                    <img src="/source/img/gestion_turno.png" alt="gestion de turnos">
                </a>
            </div>
            <div class="show"></div>
        </div>

        <div class="medicos">
            <div class="medico card">
                <div class="icon">
                    <img src="/source/img/doctor.png" alt="doctor">
                <!--https://www.flaticon.es/iconos-gratis/medico"-->
                </div>
                <div class="cant">10</div>
                <div class="show">GO</div>
            </div>
            <div class="sanatorio card">
                <div class="icon">
                    <img src="/source/img/sanatorio.png" alt="sanatorio">
                <!--https://www.flaticon.es/iconos-gratis/sanatorio"-->
                </div>
                <div class="cant">10</div>
                <div class="show">GO</div>

            </div>
            <div class="obra-social card">
                <div class="icon">
                    <img src="/source/img/obra_social.png" alt="obra social">
                <!--https://www.flaticon.es/iconos-gratis/habilidades"-->
                </div>
                <div class="cant">10</div>
                <div class="show">GO</div>
            </div>
        </div>

        <div class="contact">
            <h2>Contacto</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Mensaje:</label>
                    <textarea id="message" name="message" rows="4" required></textarea>
                </div>
                <button type="submit">Enviar</button>
            </form>
        </div>
    </div>

    <footer>

    </footer>

</body>
</html>
